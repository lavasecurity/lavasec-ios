name: iOS CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

# Public CI: build + unit tests on GitHub-hosted runners only. No secrets, no
# signing — so pull requests from forks run the full suite safely. The official
# TestFlight release pipeline and the automation loop live in the private infra
# tooling, not here.

jobs:
  repo-checks:
    name: Repo Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check GPL blocklist distribution guardrails
        run: scripts/check-gpl-blocklist-distribution.sh

  swift-package-tests:
    name: Swift Package Tests
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Test LavaSecCore
        run: swift test --package-path .

  ios-simulator-build:
    name: iOS Simulator Build
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build LavaSec
        run: |
          xcodebuild \
            -project LavaSec.xcodeproj \
            -scheme LavaSec \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
