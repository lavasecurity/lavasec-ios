name: iOS CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

# Shared CI lane — kept BYTE-IDENTICAL in the private dev repo (lavasec-ios-internal)
# and the public OSS repo (lavasec-ios). The export pipeline ships this file
# verbatim and the Merge-up contamination guard (below) depends on the two lanes
# matching; see lavasec-infra/docs/engineering/release-and-propagation.md §1.2.
#
# Cost split (public Actions minutes are free; private macOS minutes are billed).
# Three levers keep the private lane cheap WITHOUT forking this byte-identical file —
# all keyed on `github.repository` so the public lane is unaffected:
#   1. `ios-simulator-build` (full ~30-min xcodebuild) is gated to the PUBLIC repo only;
#      the private lane gets app-compile coverage from light-build.yml on owned hardware.
#   2. `swift-package-tests` (the `swift test` core suite) runs on BOTH lanes, but its
#      macOS RUNNER is chosen per-lane: GitHub-hosted (macos-26) on public, self-hosted
#      (lava-mac-vm-ios-internal) on private — so the private lane's billed macOS minutes
#      drop to $0 while keeping identical test coverage.
#   3. `repo-checks` (cheap Linux) stays GitHub-hosted on both lanes.
#
# Runners: the PUBLIC lane is GitHub-hosted only — it runs untrusted fork code, which
# must never touch owned hardware. The PRIVATE lane routes only its trusted, internal
# macOS work to self-hosted, and every self-hosted job is fork-guarded as defence in
# depth. The signed TestFlight/release pipeline lives in the private infra/runner
# tooling, not here.

jobs:
  repo-checks:
    name: Repo Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need the base..head range for the merge-up contamination guard

      - name: Check GPL blocklist distribution guardrails
        run: scripts/check-gpl-blocklist-distribution.sh

      - name: Check blocklist catalog codegen is in sync with the canonical spec
        run: node scripts/generate-blocklist-catalog.mjs --check

      - name: Merge-up contamination guard
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          set -euo pipefail
          # This repo's history was scrubbed to a single canonical identity, and changes from
          # the PRIVATE internal dev repo are promoted here via content-only PRs. This guard
          # blocks the ways internal mess could leak into the public AGPL history.
          range="${BASE}..${HEAD}"
          fail=0

          # Cover BOTH transient and persistent forbidden files: UNION the per-commit file
          # lists (git log --name-only — catches files added then deleted within the range)
          # with the net endpoint diff (git diff — catches the final tree, INCLUDING files
          # introduced only by a merge commit's resolution, which git log omits by default). (Codex P1)

          # (a) gitignored-local config / QA-only paths must never appear in any commit OR the net tree.
          touched=$(
            { git log "$range" --name-only --pretty=format:; git diff --name-only "$range"; } \
              | sort -u | grep -v '^$' || true
          )
          if printf '%s\n' "$touched" | grep -E '\.local\.xcconfig$|(^|/)QA/'; then
            echo "::error::a commit in this PR touches a *.local.xcconfig or QA/ path that must never be public."; fail=1
          fi

          # (b) The internal-only build flag must never be enabled in any commit's tracked source.
          #     Exclude .github/ so this guard's own source (which names the flag) isn't a hit.
          if { git log "$range" -p -- . ':(exclude).github/'; git diff "$range" -- . ':(exclude).github/'; } \
               | grep -E '^\+' | grep -q 'LAVA_QA_TOOLS'; then
            echo "::error::a commit in this PR enables the internal-only LAVA_QA_TOOLS flag in tracked source."; fail=1
          fi

          # (c) Identity: STRICT on promote/* (internal->public). Allow ONLY the canonical
          #     lavasecurity account (+ GitHub's web-merge committer) — NOT the whole noreply
          #     domain, so a different contributor's private email can't publish into the
          #     scrubbed history. (Codex P1) Soft on outside forks (path/flag guards still apply).
          if [ "${IS_FORK}" != "true" ] && printf '%s' "${HEAD_REF}" | grep -q '^promote/'; then
            canonical='^(285110054\+lavasecurity@users\.noreply\.github\.com|noreply@github\.com)$'
            bad=$(git log "$range" --format='%ae%n%ce' | sort -u | grep -vE "$canonical" || true)
            if [ -n "$bad" ]; then
              echo "::error::promotion PR carries non-canonical author/committer identity (expected only the lavasecurity account):"
              printf '  %s\n' $bad
              fail=1
            fi
          fi

          if [ "$fail" = 0 ]; then echo "contamination guard: clean"; else exit 1; fi

  swift-package-tests:
    name: Swift Package Tests
    # Per-lane runner WITHOUT forking this byte-identical file (same trick as
    # ios-simulator-build's gate). Self-hosted is ALLOWLISTED to the exact private repo
    # (it owns lava-mac-vm-ios-internal). EVERY other repo — the public lavasec-ios AND
    # any OSS fork of either lane — uses GitHub-hosted macos-26: a fork has no access to
    # the VM (a denylist on the public name would strand `someone/lavasec-ios` forks on
    # the self-hosted default), and public minutes are free anyway. Override the private
    # runner to a GitHub-hosted label via the IOS_CI_MAC_RUNNER repo var if the VM is
    # offline (mirrors light-build's fallback). The `if` additionally skips a fork PR
    # opened against the private repo, so fork code can never execute on the VM.
    if: ${{ github.repository != 'lavasecurity/lavasec-ios-internal' || github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    runs-on: ${{ github.repository == 'lavasecurity/lavasec-ios-internal' && fromJSON(vars.IOS_CI_MAC_RUNNER || '["self-hosted","macOS"]') || fromJSON('["macos-26"]') }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Test LavaSecCore
        run: swift test --package-path .

  ios-simulator-build:
    name: iOS Simulator Build
    # Gated to the public repo: the full xcodebuild compile burns billed macOS
    # minutes, which are free on public but cost real money on the private lane.
    # The private lane gets app-compile coverage from light-build.yml on owned
    # hardware instead, so it skips this job for $0.
    if: ${{ github.repository == 'lavasecurity/lavasec-ios' }}
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build LavaSec
        run: |
          xcodebuild \
            -project LavaSec.xcodeproj \
            -scheme LavaSec \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
