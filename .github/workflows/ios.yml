name: iOS CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

# NB: intentionally NO `paths-ignore` (REL-6). A docs filter means a docs-only PR never
# TRIGGERS this workflow, so its required contexts (Repo Checks, Swift Package Tests,
# iOS Simulator Build) are never reported and the PR is stuck on "Expected — waiting for
# status" with only an admin override to escape — hostile to the outside doc contributors
# CONTRIBUTING.md invites, and normalizing the override habit. Instead the workflow always
# runs; the `changes` job flags a docs-only diff so the expensive macOS jobs short-circuit
# their work (still completing green) while the contexts always report.

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

# Shared CI lane — kept BYTE-IDENTICAL in the private dev repo (lavasec-ios-internal)
# and the public OSS repo (lavasec-ios). The export pipeline ships this file
# verbatim and the Merge-up contamination guard (below) depends on the two lanes
# matching; see lavasec-infra/docs/engineering/release-and-propagation.md §1.2.
#
# Cost split (public Actions minutes are free; private macOS minutes are billed).
# Three levers keep the private lane cheap WITHOUT forking this byte-identical file —
# all keyed on `github.repository` so the public lane is unaffected:
#   1. `ios-simulator-build` (full ~30-min xcodebuild) is gated to the PUBLIC repo only;
#      the private lane gets app-compile coverage from light-build.yml on owned hardware.
#   2. `swift-package-tests` (the `swift test` core suite) runs on BOTH lanes, but its
#      macOS RUNNER is chosen per-lane: GitHub-hosted (macos-26) on public, self-hosted
#      (lava-mac-vm-ios-internal) on private — so the private lane's billed macOS minutes
#      drop to $0 while keeping identical test coverage.
#   3. `repo-checks` (cheap Linux) stays GitHub-hosted on both lanes.
#
# Runners: the PUBLIC lane is GitHub-hosted only — it runs untrusted fork code, which
# must never touch owned hardware. The PRIVATE lane routes only its trusted, internal
# macOS work to self-hosted, and every self-hosted job is fork-guarded as defence in
# depth. The signed TestFlight/release pipeline lives in the private infra/runner
# tooling, not here.

jobs:
  changes:
    # Flags a docs-only PR so the expensive macOS jobs can short-circuit while still
    # completing (their required contexts must report — see the no-paths-ignore note
    # above). Cheap Linux; the mac jobs `needs:` it. Non-PR events (push/dispatch) and
    # anything that can't be classified fall through to docs_only=false → jobs run fully.
    name: Detect docs-only diff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need base..head to diff the PR's file list
      - name: Detect docs-only diff
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Only PRs can be short-circuited; a push to main always runs fully.
          if [ "$EVENT" != "pull_request" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"; echo "not a PR → run fully"; exit 0
          fi
          # --no-renames so a rename decomposes into delete(old)+add(new): renaming a
          # buildable source INTO docs/ or to a *.md name would otherwise show ONLY the
          # docs destination (git's default rename detection), read as docs-only, and skip
          # the build for a tree that actually lost a source file (Codex P2 #232).
          files=$(git diff --no-renames --name-only "$BASE".."$HEAD" || true)
          echo "changed files:"; printf '%s\n' "$files"
          # Fail safe: an empty/undeterminable diff runs fully. docs-only ⇔ EVERY changed
          # file is under docs/ or ends in .md (README, CONTRIBUTING, etc.).
          if [ -z "$files" ] || printf '%s\n' "$files" | grep -qvE '^(docs/|.*\.md$)'; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"; echo "non-docs changes present → run fully"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"; echo "docs-only → macOS jobs short-circuit"
          fi

  repo-checks:
    name: Repo Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need the base..head range for the merge-up contamination guard

      - name: Check GPL blocklist distribution guardrails
        run: scripts/check-gpl-blocklist-distribution.sh

      - name: Check blocklist catalog codegen is in sync with the canonical spec
        run: node scripts/generate-blocklist-catalog.mjs --check

      - name: Check localization completeness (all locales present + nothing left untranslated)
        run: node scripts/check-localization.mjs

      - name: Check UI string catalog coverage (no hardcoded user-facing strings outside the catalog)
        run: node scripts/check-string-coverage.mjs

      - name: SwiftLint (warning-only)
        # Phase C2 lint lane (lavasec-infra plans/2026-07-07-ios-modularization-scaffolding-plan.md).
        # --lenient downgrades every violation to a warning, so findings ANNOTATE the PR but
        # never fail this required check; a broken .swiftlint.yml still fails loudly.
        # missing_docs is scoped to the post-split SPM targets via their nested configs.
        # Version-pinned like the other containerized scanners (security.yml).
        uses: docker://ghcr.io/realm/swiftlint:0.59.1
        with:
          # The leading `swiftlint` token is REQUIRED for this pinned image: 0.59.1 is
          # CMD-style (no ENTRYPOINT), so args form the whole container command — dropping
          # the token fails at docker exec (`"--lenient": executable file not found`,
          # run 2026-07-08 on this repo). Upstream added an ENTRYPOINT after 0.59.1
          # (Codex P1 on lavasec-ios#50 cited main); if this pin is ever bumped to an
          # ENTRYPOINT image, drop the token or the binary name doubles.
          args: swiftlint --lenient --reporter github-actions-logging

      - name: Merge-up contamination guard
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          set -euo pipefail
          # This repo's history was scrubbed to a single canonical identity, and changes from
          # the PRIVATE internal dev repo are promoted here via content-only PRs. This guard
          # blocks the ways internal mess could leak into the public AGPL history.
          range="${BASE}..${HEAD}"
          fail=0

          # Cover BOTH transient and persistent forbidden files: UNION the per-commit file
          # lists (git log --name-only — catches files added then deleted within the range)
          # with the net endpoint diff (git diff — catches the final tree, INCLUDING files
          # introduced only by a merge commit's resolution, which git log omits by default). (Codex P1)

          # (a) gitignored-local config / QA-only paths must never appear in any commit OR the net tree.
          touched=$(
            { git log "$range" --name-only --pretty=format:; git diff --name-only "$range"; } \
              | sort -u | grep -v '^$' || true
          )
          if printf '%s\n' "$touched" | grep -E '\.local\.xcconfig$|(^|/)QA/'; then
            echo "::error::a commit in this PR touches a *.local.xcconfig or QA/ path that must never be public."; fail=1
          fi

          # (b) The internal-only build flag must never be enabled in any commit's tracked source.
          #     Exclude .github/ so this guard's own source (which names the flag) isn't a hit.
          if { git log "$range" -p -- . ':(exclude).github/'; git diff "$range" -- . ':(exclude).github/'; } \
               | grep -E '^\+' | grep -q 'LAVA_QA_TOOLS'; then
            echo "::error::a commit in this PR enables the internal-only LAVA_QA_TOOLS flag in tracked source."; fail=1
          fi

          # (c) Identity: STRICT on promote/* (internal->public). Allow ONLY the canonical
          #     lavasecurity account (+ GitHub's web-merge committer) — NOT the whole noreply
          #     domain, so a different contributor's private email can't publish into the
          #     scrubbed history. (Codex P1) Soft on outside forks (path/flag guards still apply).
          if [ "${IS_FORK}" != "true" ] && printf '%s' "${HEAD_REF}" | grep -q '^promote/'; then
            canonical='^(285110054\+lavasecurity@users\.noreply\.github\.com|noreply@github\.com)$'
            bad=$(git log "$range" --format='%ae%n%ce' | sort -u | grep -vE "$canonical" || true)
            if [ -n "$bad" ]; then
              echo "::error::promotion PR carries non-canonical author/committer identity (expected only the lavasecurity account):"
              printf '  %s\n' $bad
              fail=1
            fi
          fi

          if [ "$fail" = 0 ]; then echo "contamination guard: clean"; else exit 1; fi

  swift-package-tests:
    name: Swift Package Tests
    needs: changes
    # Per-lane runner WITHOUT forking this byte-identical file (same trick as
    # ios-simulator-build's gate). Self-hosted is ALLOWLISTED to the exact private repo
    # (it owns lava-mac-vm-ios-internal). EVERY other repo — the public lavasec-ios AND
    # any OSS fork of either lane — uses GitHub-hosted macos-26: a fork has no access to
    # the VM (a denylist on the public name would strand `someone/lavasec-ios` forks on
    # the self-hosted default), and public minutes are free anyway. Override the private
    # runner to a GitHub-hosted label via the IOS_CI_MAC_RUNNER repo var if the VM is
    # offline (mirrors light-build's fallback). The `if` additionally skips a fork PR
    # opened against the private repo, so fork code can never execute on the VM.
    # `!cancelled()` forces this REQUIRED job to run even if the `changes` prerequisite FAILED
    # (transient checkout/git-diff/outage) instead of being skipped by `needs` — a skipped-after-
    # failed-dependency required check may not block the PR, so a code PR could merge without this
    # macOS check (Codex P1 #232). On a `changes` failure `docs_only` is '' so the step-level guard
    # runs the suite fully (fail-safe). The fork-guard is preserved (parenthesised under the &&).
    if: ${{ !cancelled() && (github.repository != 'lavasecurity/lavasec-ios-internal' || github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
    runs-on: ${{ github.repository == 'lavasecurity/lavasec-ios-internal' && fromJSON(vars.IOS_CI_MAC_RUNNER || '["self-hosted","macOS"]') || fromJSON('["macos-26"]') }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Prepare warm test cache (per-runner, Xcode-keyed)
        # Docs-only PRs skip the mac test entirely (REL-6); the job still completes so its
        # required "Swift Package Tests" context reports green.
        if: ${{ needs.changes.outputs.docs_only != 'true' }}
        run: |
          set -euo pipefail
          # Warm per-runner cache keyed by the Xcode build version. On GitHub-hosted runners the home
          # dir is ephemeral so this is just a cold run (harmless); on a persistent self-hosted runner
          # it makes incremental test builds fast. Growth is bounded by the runner maintenance sweep.
          XC="$(xcodebuild -version 2>/dev/null | awk '/^Build version/{print $3}')"; XC="${XC:-unknown}"
          CACHE="$HOME/.lava-ci/cache/${RUNNER_NAME:-shared}/xcode-$XC"
          mkdir -p "$CACHE/.build" "$CACHE/spm"
          { echo "SCRATCH=$CACHE/.build"; echo "SPMCACHE=$CACHE/spm"; } >> "$GITHUB_ENV"
          echo "warm cache: $CACHE"

      - name: Test LavaSecCore
        if: ${{ needs.changes.outputs.docs_only != 'true' }}
        run: |
          set -euo pipefail
          # Warm per-runner cache ($SCRATCH/$SPMCACHE from the "Prepare warm test cache" step). The
          # shared flock lets the maintenance sweep GC that cache safely, never mid-build. On
          # GitHub-hosted runners RUNNER_ENVIRONMENT != "self-hosted", so this runs unwrapped.
          LOCK="$HOME/.lava-ci/maintenance.lock"; mkdir -p "$(dirname "$LOCK")"
          cmd=(swift test --package-path .
            --scratch-path "$SCRATCH"
            --cache-path "$SPMCACHE")
          if [ "${RUNNER_ENVIRONMENT:-}" = self-hosted ]; then
            FLOCK="$(command -v flock || true)"
            [ -n "$FLOCK" ] || for c in /opt/homebrew/bin/flock /usr/local/bin/flock; do [ -x "$c" ] && FLOCK="$c" && break; done
            [ -n "$FLOCK" ] || { echo "::error::flock required on self-hosted runner (brew install flock)"; exit 1; }
            "$FLOCK" -s "$LOCK" "${cmd[@]}"
          else
            "${cmd[@]}"
          fi

  ios-simulator-build:
    name: iOS Simulator Build
    needs: changes
    # Gated to the public repo: the full xcodebuild compile burns billed macOS
    # minutes, which are free on public but cost real money on the private lane.
    # The private lane gets app-compile coverage from light-build.yml on owned
    # hardware instead, so it skips this job for $0.
    # `!cancelled()` so a FAILED `changes` prerequisite doesn't skip this required job (see
    # swift-package-tests' note — Codex P1 #232); the public-repo gate is preserved.
    if: ${{ !cancelled() && github.repository == 'lavasecurity/lavasec-ios' }}
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build LavaSec
        # Docs-only PRs skip the ~30-min compile (REL-6); the job still reports its
        # required "iOS Simulator Build" context green.
        if: ${{ needs.changes.outputs.docs_only != 'true' }}
        run: |
          xcodebuild \
            -project LavaSec.xcodeproj \
            -scheme LavaSec \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
