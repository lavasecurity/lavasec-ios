name: Security

# Delegates to the org-wide reusable security backstop (gitleaks secret scan +
# mobsfscan mobile SAST). Replaces the self-contained inline copy this repo used to
# carry: a public repo could not call a reusable workflow while lavasecurity/.github
# was private, so the scan was vendored here and drifted from the canonical job. Now
# that lavasecurity/.github is public, both lanes call it and the policy (gitleaks
# config trust, pinned image, mobsfscan SARIF upload) lives in one hardened place. The
# mobsfscan SARIF upload to code scanning is gated on GitHub Advanced Security, so it
# uploads on the public lane and auto-skips on the private mirror — the same
# visibility-dependent behaviour the inline copy had. This file is a SHARED CI lane
# kept byte-identical across the private and public repos (see ios.yml's header + the
# export readiness gate); write comments lane-NEUTRAL so the invariant can hold.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    # mobsfscan's SARIF upload writes to code scanning, so grant the scope here — a
    # reusable workflow cannot elevate beyond the permissions the caller passes. The
    # upload is gated on Advanced Security, so it no-ops on the private mirror; the grant
    # is harmless there and keeps the public lane correct.
    permissions:
      contents: read
      security-events: write
    uses: lavasecurity/.github/.github/workflows/security.yml@main
    with:
      gitleaks: true
      mobsfscan: true
