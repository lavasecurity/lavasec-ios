name: Security

# Delegates to the org-wide reusable security backstop (gitleaks secret scan +
# mobsfscan mobile SAST). Replaces the self-contained inline copy this repo used to
# carry: a public repo could not call a reusable workflow in the then-private
# lavasecurity/.github, so the scan was vendored here and had drifted from the
# canonical job. Now that lavasecurity/.github is public, a public repo can call it,
# and the policy (gitleaks config trust, pinned image, mobsfscan SARIF upload) lives
# in one hardened place again. The central mobsfscan job uploads findings to this
# repo's code scanning (SARIF) — the capability the inline copy provided.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    uses: lavasecurity/.github/.github/workflows/security.yml@main
    with:
      gitleaks: true
      mobsfscan: true
