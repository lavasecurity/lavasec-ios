# gitleaks configuration for lavasec-ios.
#
# Extends the default ruleset and allowlists the SPECIFIC synthetic credential
# strings that live in our unit-test fixtures. These are matched by value (not
# by whole-file path), so the files stay fully scanned: a real secret
# accidentally committed to either file would still be caught. There are no real
# secrets in this repository. Verified 2026-06-15.
title = "lavasec-ios gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Synthetic credential fixtures (matched by value; no real secrets)"
regexes = [
  # LatencyTraceTests.swift — fake auth headers / JWT asserting diagnostics get
  # REDACTED (the test checks "eyJ"/"Bearer" never reach output).
  '''apiKey=abc123''',
  '''Bearer abc123''',
  '''Token abc123''',
  '''eyJhbGciOiJIUzI1NiJ9\.eyJzdWIiOiIxMjMifQ\.signature''',
  # ZeroKnowledgeBackupEnvelopeTests.swift — deterministic base64 test vectors
  # for zero-knowledge backup decryption (sequential-byte inputs, not real keys).
  '''ICEiIyQlJicoKSorEQFga6I''',
  '''EBESExQVFhcYGRobycnbdOcUa8Av''',
]
