# Phase C2 lint lane (lavasec-infra plans/2026-07-07-ios-modularization-scaffolding-plan.md).
# The general CI invocation stays WARNING-ONLY (`--lenient`) so style findings annotate
# PRs without blocking. A separate strict missing_docs invocation selects the dedicated
# `.swiftlint-missing-docs.yml` and committed baseline, so only new undocumented public API
# fails.
#
# The dedicated config scopes the blocking ratchet to exactly the six real package layers.
# Their nested .swiftlint.yml files keep missing_docs enabled in the general warning-only
# lane, matching the CLAUDE.md rule: new public API there carries /// docs; pre-split code
# is retrofitted opportunistically, never in bulk.
included:
  - Sources
  - Shared
  - LavaSecApp
  - LavaSecTunnel
  - LavaSecWidget
  - LavaSecIntents
  - LavaSecUITests
  - Tests
excluded:
  - .build
  - build
  - Sources/LavaSecKit/Generated

# Style axes the codebase deliberately doesn't police (dense rationale comments push
# line/body length; the design system uses long SwiftUI builder chains).
disabled_rules:
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - identifier_name
  - trailing_comma
  - todo   # scripts/check-comment-contracts.mjs owns deferred-work comment enforcement
