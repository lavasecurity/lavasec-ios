      - path: LavaSecIntents/LavaSecIntents.entitlements
        buildPhase: none
    dependencies:
      - package: LavaSecPackage
        product: LavaSecKit
      - package: LavaSecPackage
        product: LavaSecFilterPipeline
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: "YES"
        CODE_SIGN_ENTITLEMENTS: LavaSecIntents/LavaSecIntents.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "$(inherited)"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: LavaSecIntents/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
        MARKETING_VERSION: "$(inherited)"
        PRODUCT_NAME: LavaSecIntents
        SKIP_INSTALL: "YES"
        # Full default list — EntityQuery/DynamicOptionsProvider must stay or the
        # metadata processor loses the AppEntity query (#142).
        # pinned: FocusFilterIntentWiringSourceTests.testConstValueProtocolsIncludeQueryProtocols
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: AppIntent LiveActivityIntent EntityQuery AppEntity TransientEntity AppEnum AppShortcutProviding AppShortcutsProvider AnyResolverProviding AppIntentsPackage DynamicOptionsProvider _IntentValueRepresentable _AssistantIntentsProvider _GenerativeFunctionExtractable IntentValueQuery Resolver
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.lavasec.app.intents
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.lavasec.app.intents
          PROVISIONING_PROFILE_SPECIFIER: "$(LAVASEC_INTENTS_PROFILE)"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: RELEASE
        QA:
          PRODUCT_BUNDLE_IDENTIFIER: com.lavasec.dev.qa.intents
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: RELEASE LAVA_QA_TOOLS

  LavaSecUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LavaSecUITests/SecuritySettingsUITests.swift
      - path: LavaSecUITests/CoreFlowDeviceTests.swift
    dependencies:
      - target: LavaSec
