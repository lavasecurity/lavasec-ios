      - package: LavaSecPackage
        product: LavaSecCore
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "$(inherited)"
        GENERATE_INFOPLIST_FILE: "YES"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        MARKETING_VERSION: "$(inherited)"
        PRODUCT_NAME: "$(TARGET_NAME)"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_TARGET_NAME: LavaSec
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.lavasec.app.uitests
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.lavasec.app.uitests
        QA:
          PRODUCT_BUNDLE_IDENTIFIER: com.lavasec.dev.qa.uitests
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG LAVA_QA_TOOLS

# The one shared scheme committed pre-C1 (LavaSec.xcodeproj/xcshareddata/xcschemes).
# Xcode auto-creates per-target and package (LavaSecCore) schemes locally.
schemes:
  LavaSec:
    build:
      parallelizeBuild: true
      buildImplicitDependencies: true
      targets:
        LavaSec: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LavaSecUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
      revealArchiveInOrganizer: true
